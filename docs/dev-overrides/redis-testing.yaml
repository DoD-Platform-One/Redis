# Override file for testing the Redis package alongside Authservice.
# Intended to be layered with test-values.yaml and ingress-certs.yaml.
#
# Deploy command (run from the bigbang repo root):
#
#   helm upgrade -i bigbang chart/ -n bigbang --create-namespace \
#     --set registryCredentials.username=${REGISTRY1_USERNAME} \
#     --set registryCredentials.password="${REGISTRY1_TOKEN}" \
#     -f tests/test-values.yaml \
#     -f https://repo1.dso.mil/big-bang/bigbang/-/raw/master/chart/ingress-certs.yaml \
#     -f ../overrides/redis.yaml

sso:
  # This is needed because test-values.yaml overrides it to reference the internal keycloak
  url: https://login.dso.mil/auth/realms/baby-yoda

grafana:
  enabled: true
  sso:
    enabled: true
    grafana:
      client_id: platform1_a8604cc9-f5e9-4656-802d-d05624370245_bb8-grafana
      scopes: "openid Grafana"

istioGateway:
  enabled: true
  values:
    gateways:
      passthrough: {}

monitoring:
  enabled: true

addons:
  authservice:
    enabled: true
    values:
      monitoring:
        enabled: true
      # Disable the embedded Redis subchart and point authservice at
      # the standalone Redis package below instead. This lets authservice
      # exercise the branch under test rather than its own bundled Redis.
      redis:
        enabled: false
      global:
        redis_server_uri: "tcp://redis-bb-master.redis.svc.cluster.local:6379"

packages:
  redis:
    enabled: true
    # -------------------------------------------------------
    # Set the Redis branch under test here.
    # -------------------------------------------------------
    git:
      tag: null
      repo: "https://repo1.dso.mil/big-bang/product/maintained/redis.git"
      branch: "your-branch-name"
    values:
      monitoring:
        enabled: true
      upstream:
        auth:
          enabled: false
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
            tlsConfig:
              caFile: /etc/prom-certs/root-cert.pem
              certFile: /etc/prom-certs/cert-chain.pem
              keyFile: /etc/prom-certs/key.pem
              insecureSkipVerify: true
      istio:
        enabled: true
        redis:
          enabled: true
        hardened:
          enabled: true
          # Allow authservice (cross-namespace) to reach the Redis master.
          # Required because the intra-namespace policy only permits traffic
          # sourced from within the redis namespace.
          customAuthorizationPolicies:
            - name: allow-authservice-to-redis
              enabled: true
              spec:
                action: ALLOW
                rules:
                  - from:
                    - source:
                        namespaces:
                          - authservice
        
