# This overrides file is for deploying only the packages needed to test authservice during renovate or other update/change work, and should be used in combination with the testing steps called out in docs/DEVELOPMENT_MAINTENANCE.md
# This is for deploying with a local keycloak (keycloak.dev.bigbang.mil)
# Please use docs/dev-overrides/authservice-testing.yaml for testing with the login.dso.mil keycloak instead

# Sample deploy command, to be run from the package repo root:
# helm upgrade -i bigbang <absolute_path_to_local_bigbang_repo>/chart/ -n bigbang --create-namespace \
# --set registryCredentials.username=${REGISTRY_USERNAME} --set registryCredentials.password=${REGISTRY_PASSWORD} \
# -f https://repo1.dso.mil/big-bang/bigbang/-/raw/master/tests/test-values.yaml \
# -f https://repo1.dso.mil/big-bang/bigbang/-/raw/master/chart/ingress-certs.yaml \
# -f docs/dev-overrides/minimal.yaml \
# -f docs/dev-overrides/authservice-testing-local-keycloak.yaml

grafana:
  enabled: true
  sso:
    enabled: true
    grafana:
      client_id: platform1_a8604cc9-f5e9-4656-802d-d05624370245_bb8-grafana
      scopes: "openid Grafana"

istioGateway:
  enabled: true

monitoring:
  enabled: true
  sso:
    enabled: true

addons:
  authservice:
    enabled: true
    values:
      monitoring:
        enabled: true
      # Disable the embedded Redis subchart and point authservice at
      # the standalone Redis package below instead. This lets authservice
      # exercise the branch under test rather than its own bundled Redis.
      redis:
        enabled: false
      global:
        redis_server_uri: "tcp://redis-bb-master.redis.svc.cluster.local:6379"

packages:
  redis:
    enabled: true
    # -------------------------------------------------------
    # Set the Redis branch under test here.
    # -------------------------------------------------------
    git:
      tag: null
      repo: "https://repo1.dso.mil/big-bang/product/maintained/redis.git"
      branch: "your-branch-name"
    values:
      monitoring:
        enabled: true
      upstream:
        auth:
          enabled: false
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
            tlsConfig:
              caFile: /etc/prom-certs/root-cert.pem
              certFile: /etc/prom-certs/cert-chain.pem
              keyFile: /etc/prom-certs/key.pem
              insecureSkipVerify: true
      istio:
        enabled: true
        redis:
          enabled: true
        hardened:
          enabled: true
          # Allow authservice (cross-namespace) to reach the Redis master.
          # Required because the intra-namespace policy only permits traffic
          # sourced from within the redis namespace.
          customAuthorizationPolicies:
            - name: allow-authservice-to-redis
              enabled: true
              spec:
                action: ALLOW
                rules:
                  - from:
                    - source:
                        namespaces:
                          - authservice
  keycloak:
    enabled: true
